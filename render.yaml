services:
  - type: web
    name: zionapply
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3210
      - key: OPENAI_MODEL
        value: gpt-5
      - key: APP_BASE_URL
        value: https://www.zionedu.cn
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
